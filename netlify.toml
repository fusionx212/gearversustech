[build]
  command = "npm run build"
  publish = "dist"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

[[redirects]]
  from = "/smart-home"
  to = "/smart-home/"
  status = 301

[[redirects]]
  from = "/gaming"
  to = "/gaming/"
  status = 301

[[redirects]]
  from = "/best"
  to = "/best/"
  status = 301

[[redirects]]
  from = "/contact"
  to = "/contact/"
  status = 301

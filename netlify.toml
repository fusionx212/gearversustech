[build]
  command = "npm run build"
  publish = "dist"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# Old article URLs → new compare URLs
[[redirects]]
  from = "/smart-home/homey-pro-vs-aqara-hub-m3/*"
  to = "/smart-home/compare/homey-pro-vs-aqara-hub-m3/"
  status = 301

[[redirects]]
  from = "/smart-home/govee-gaming-lights-vs-philips-hue-play/*"
  to = "/smart-home/compare/govee-gaming-lights-vs-philips-hue-play/"
  status = 301

[build]
  command = "npm run build"
  publish = "dist"
  # BATCHED DEPLOYS (credit control): ~15 credits/~$0.10 per production deploy, flat.
  # Plain git push → cancel free. Real deploy = fire build hook (sets $INCOMING_HOOK_TITLE).
  # See C:\Users\dalec\netlify-release.ps1 + agent_docs/netlify-deploy-guard.md
  ignore = "[ -z \"$INCOMING_HOOK_TITLE\" ] || git diff --quiet ${CACHED_COMMIT_REF:-HEAD~1} $COMMIT_REF -- . ':(exclude)README.md' ':(exclude)n8n-workflows' ':(exclude).github'"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# Old article URLs → new compare URLs
[[redirects]]
  from = "/smart-home/homey-pro-vs-aqara-hub-m3/*"
  to = "/smart-home/compare/homey-pro-vs-aqara-hub-m3/"
  status = 301

[[redirects]]
  from = "/smart-home/govee-gaming-lights-vs-philips-hue-play/*"
  to = "/smart-home/compare/govee-gaming-lights-vs-philips-hue-play/"
  status = 301

